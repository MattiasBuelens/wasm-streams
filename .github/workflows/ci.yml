name: CI
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
jobs:
  test:
    name: Test on ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - toolchain: stable
          # Recent Rust nightlies with LLVM 22 are temporarily broken with panic=unwind.
          # See https://github.com/wasm-bindgen/wasm-bindgen/issues/4929
          - toolchain: nightly-2026-01-28
            unstable-flags: "-Zbuild-std"
            rust-flags: "-Cpanic=unwind"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: wasm32-unknown-unknown
          components: rust-src

      - name: Install Node 23
        uses: actions/setup-node@v6
        with:
          node-version: 23

      - name: Run cargo check
        run: cargo check --target wasm32-unknown-unknown ${{ matrix.unstable-flags }}
        env:
          RUSTFLAGS: ${{ matrix.rust-flags }}

      - name: Run cargo test
        run: cargo test --target=x86_64-unknown-linux-gnu
        env:
          RUSTFLAGS: ${{ matrix.rust-flags }}

      - name: Install wasm-pack
        run: curl https://drager.github.io/wasm-pack/installer/init.sh -sSf | bash

      - name: Test on Node
        run: wasm-pack test --node -- ${{ matrix.unstable-flags }}
        env:
          RUSTFLAGS: ${{ matrix.rust-flags }}

      - name: Test on Chrome
        run: wasm-pack test --headless --chrome -- ${{ matrix.unstable-flags }}
        env:
          RUSTFLAGS: ${{ matrix.rust-flags }}
          WASM_BINDGEN_USE_BROWSER: "1"

      - name: Test on Firefox
        run: wasm-pack test --headless --firefox -- ${{ matrix.unstable-flags }}
        env:
          RUSTFLAGS: ${{ matrix.rust-flags }}
          WASM_BINDGEN_USE_BROWSER: "1"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install stable Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy --target=wasm32-unknown-unknown
